services:
  backend:
    build: ./backend
    expose:
      - "8080"
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/jobs.db
      - ADDR=:8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
