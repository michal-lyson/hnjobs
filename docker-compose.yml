services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/jobs.db
      - ADDR=:8080
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
